name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: ["testpypi", "pypi"]
      dry_run:
        description: "Dry run (build + validate only, no upload)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate artifacts with twine
        run: twine check --strict dist/*

      - name: Extract version
        id: meta
        run: |
          VERSION=$(python -c "
          try:
              import tomllib
              with open('pyproject.toml', 'rb') as f:
                  print(tomllib.load(f)['project']['version'])
          except ImportError:
              import re, pathlib
              m = re.search(r'^version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M)
              print(m.group(1))
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.meta.outputs.version }}
          path: dist/
          if-no-files-found: error

  # Configure a trusted publisher on TestPyPI with:
  # owner=dannielperez repo=pytvt workflow=publish.yml environment=testpypi
  publish_testpypi:
    needs: build
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  validate_testpypi:
    needs: [build, publish_testpypi]
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install from TestPyPI with retries
        run: |
          set -euo pipefail
          python -m venv .venv-testpypi
          VERSION="${{ needs.build.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if .venv-testpypi/bin/pip install --no-cache-dir \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "pytvt==${VERSION}"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep 15
          done

      - name: Smoke test TestPyPI package
        run: |
          set -euo pipefail
          .venv-testpypi/bin/python - <<'PY'
          import pytvt
          from pytvt import DeviceManager, NoBackendAvailable, ScannerConfig
          from pytvt.netsdk.loader import NetSdkUnavailable, load_sdk

          assert pytvt.__version__ == "${{ needs.build.outputs.version }}"
          cfg = ScannerConfig()
          assert cfg.username == "admin"
          assert cfg.sdk_path is None
          assert cfg.scan_script is None

          try:
              load_sdk()
          except NetSdkUnavailable:
              pass
          else:
              raise SystemExit("load_sdk unexpectedly succeeded without SDK")

          try:
              DeviceManager("127.0.0.1", "admin", "x")
          except NoBackendAvailable:
              pass
          else:
              raise SystemExit("DeviceManager unexpectedly succeeded without SDK or bridge")
          PY

  # Configure a trusted publisher on PyPI with:
  # owner=dannielperez repo=pytvt workflow=publish.yml environment=pypi
  publish:
    needs: [build, validate_testpypi]
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi' && github.event.inputs.dry_run == 'false')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
